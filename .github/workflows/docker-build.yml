name: Build and Release Versioned Docker Image

on:
  push:
    tags:
      - 'v*' # 当推送到以 v 开头的 tag 时触发，例如 v1.0.0

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 1. 提取版本号（从 refs/tags/v1.2.3 提取出 1.2.3）
      - name: Get Version
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            # 使用提取的版本号
            ${{ secrets.DOCKERHUB_USERNAME }}/tete-notifier:${{ steps.get_version.outputs.VERSION }}
            # 同时保留 latest 标签
            ${{ secrets.DOCKERHUB_USERNAME }}/tete-notifier:latest
